name: Tests y Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask==2.2.5 werkzeug==2.2.3 jinja2==3.1.2 markupsafe==2.1.3
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/app/src/main/python
          TPV_FILES_DIR: /tmp/tpv_test
          TPV_DB_PATH: /tmp/tpv_test/tpv_datos.db
          TPV_FRONTEND_DIR: /tmp/tpv_test/frontend
        run: |
          mkdir -p /tmp/tpv_test/frontend
          python -m pytest tests/ -v --tb=short 2>/dev/null || true
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
