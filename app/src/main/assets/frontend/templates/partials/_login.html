<section class="login">
  <h2>Iniciar sesión</h2>

  <div class="form-group">
    <label for="login_user">Usuario</label>
    <input id="login_user" type="text" autocomplete="username">
  </div>

  <div class="form-group">
    <label for="login_pass">Contraseña</label>
    <input id="login_pass" type="password" autocomplete="current-password">
  </div>

  <div id="login_error" style="display:none;color:red;margin-top:10px;"></div>

  <button id="login_btn" class="btn btn-primary">Entrar</button>
</section>

<script src="/static/js/tpv_login.js"></script>
