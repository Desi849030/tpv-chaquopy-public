name: CI/CD Agentic AI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-python-ai:
    name: Test IA Logic & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Test Dependencies
        run: |
          pip install pytest pytest-cov
          
      - name: Run AI Tests with Coverage
        run: |
          pytest --cov=app/src/main/python --cov-report=xml --cov-report=term-missing
          
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test-python-ai # ¡Solo compila si los tests pasan!
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Python for Chaquopy
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tpv-agentic-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
