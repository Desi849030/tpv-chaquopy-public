name: CI
on:[push]
jobs:
  test:
    runs-on: ubuntu-latest
    env:{TPV_TESTING:"1",TPV_SECRET_KEY:"ci",TPV_DEMO_PASSWORD:"ci",PYTHONPATH:"app/src/main/python"}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:{python-version:"3.10"}
    - run: pip install -r requirements.txt pytest pytest-cov
    - run: python -m pytest tests/ tests/ia/ tests/e2e/ tests/frontend/ -v --tb=short -x
    - run: python -m pytest tests/backend/ tests/ia/ --cov=app/src/main/python --cov-report=term -q
