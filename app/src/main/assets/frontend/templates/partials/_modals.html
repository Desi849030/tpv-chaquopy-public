eholder_image_url"></div><div class="mb-3"><label for="gestion-producto-imagen-local" class="form-label" data-i18n="form_label_image_local"></label><input type="file" id="gestion-producto-imagen-local" class="form-control" accept="image/*" onchange="g_previewImg(this)"><div id="g-img-wrap" class="mt-2 d-none text-center"><img id="g-img-el" src="" style="max-height:120px;max-width:100%;border-radius:.5rem;border:2px solid #e2e8f0;object-fit:cover"><br><button type="button" class="btn btn-sm btn-outline-danger mt-1" onclick="g_quitarImg()"><i class="bi bi-x-circle me-1"></i>Quitar</button></div></div><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" role="switch" id="gestion-producto-oferta"><label class="form-check-label" for="gestion-producto-oferta" data-i18n="form_label_on_sale"></label></div></form></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="btn_cancel"></button><button type="submit" form="gestion-form-producto" class="btn btn-primary" data-i18n="btn_save" translate="no"></button></div></div></div></div>
