openapi: 3.0.3
info:
  title: TPV Ultra Smart API
  version: "6.13.1"
  description: API principal del TPV Ultra Smart orientada a operación local/offline-first y diagnóstico de telecomunicaciones.

servers:
  - url: http://127.0.0.1:5000

paths:
  /health:
    get:
      summary: Healthcheck general
      responses:
        "200":
          description: Aplicación y BD operativas
        "503":
          description: Estado degradado

  /api/health:
    get:
      summary: Healthcheck API
      responses:
        "200":
          description: API operativa
        "503":
          description: Estado degradado

  /api/auth/login:
    post:
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login correcto
        "400":
          description: Datos incompletos
        "401":
          description: Credenciales inválidas
        "429":
          description: Usuario bloqueado o exceso de intentos

  /api/auth/logout:
    post:
      summary: Cerrar sesión
      responses:
        "200":
          description: Sesión cerrada

  /api/auth/me:
    get:
      summary: Obtener usuario autenticado
      responses:
        "200":
          description: Usuario autenticado
        "401":
          description: No autenticado

  /api/ventas/registrar:
    post:
      summary: Registrar venta
      description: Registra una venta de forma atómica validando stock.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                metodo_pago:
                  type: string
                  example: efectivo
                items:
                  type: array
                  items:
                    type: object
                    required: [id, nombre, cantidad, precio]
                    properties:
                      id:
                        type: string
                        example: p1
                      nombre:
                        type: string
                        example: Café
                      cantidad:
                        type: number
                        example: 2
                      precio:
                        type: number
                        example: 1.5
      responses:
        "200":
          description: Venta registrada
        "400":
          description: Datos inválidos
        "401":
          description: Requiere autenticación
        "404":
          description: Producto no encontrado
        "409":
          description: Stock insuficiente
        "500":
          description: Error interno

  /api/ventas/hoy:
    get:
      summary: Listar ventas del día
      responses:
        "200":
          description: Consulta correcta
        "401":
          description: Requiere autenticación

  /api/ventas/totales:
    get:
      summary: Totales de ventas del día y del mes
      responses:
        "200":
          description: Consulta correcta
        "401":
          description: Requiere autenticación

  /api/ventas/cierre:
    post:
      summary: Cierre de caja
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fecha:
                  type: string
                  example: "2026-06-14"
      responses:
        "200":
          description: Cierre realizado
        "401":
          description: Requiere autenticación
        "500":
          description: Error interno

  /api/dev/telecom/latencia:
    get:
      summary: Medir RTT HTTP, P95, variación y solicitudes fallidas
      parameters:
        - in: query
          name: intentos
          schema: {type: integer, minimum: 1, maximum: 10, default: 5}
      responses:
        "200": {description: Medición o estado offline}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/telecom/throughput:
    get:
      summary: Medir goodput HTTP de una muestra acotada
      parameters:
        - in: query
          name: bytes
          schema: {type: integer, minimum: 1024, maximum: 1000000, default: 100000}
      responses:
        "200": {description: Goodput o estado offline}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/telecom/dns:
    get:
      summary: Medir resolución DNS
      parameters:
        - in: query
          name: host
          schema: {type: string, maxLength: 253}
      responses:
        "200": {description: Direcciones y tiempo getaddrinfo}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/telecom/tls:
    get:
      summary: Medir conexión TCP y negociación TLS
      responses:
        "200": {description: Tiempos, cipher y certificado}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/telecom/full:
    get:
      summary: Ejecutar diagnóstico por capas
      responses:
        "200": {description: Diagnóstico agregado online/offline}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/telecom/metodologia:
    get:
      summary: Obtener unidades, capas y limitaciones de las métricas
      responses:
        "200": {description: Metodología de Ingeniería en Telecomunicaciones}
        "403": {description: Requiere rol Desarrollador}

  /api/setup/status:
    get:
      summary: Consultar si la configuración inicial local está pendiente
      responses:
        "200": {description: Estado sin información sensible}

  /api/setup/developer:
    post:
      summary: Crear contraseña inicial del Desarrollador
      description: Solo loopback y una única ejecución por instalación.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirmacion]
              properties:
                password: {type: string, minLength: 12, format: password}
                confirmacion: {type: string, minLength: 12, format: password}
      responses:
        "200": {description: Configuración completada}
        "400": {description: Contraseña inválida o no coincide}
        "403": {description: Solicitud no local}
        "409": {description: Configuración ya completada}

  /api/dev/project/summary:
    get:
      summary: Resumen dinámico de módulos, funciones, clases y rutas
      responses:
        "200": {description: Inventario AST resumido}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/modules:
    get:
      summary: Buscar módulos y explicar funciones, clases y rutas
      parameters:
        - in: query
          name: q
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 50, default: 10}
      responses:
        "200": {description: Módulos coincidentes}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/structure:
    get:
      summary: Estructura real de carpetas del repositorio
      responses:
        "200": {description: Directorios y entradas}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/thesis:
    get:
      summary: Resumen estructurado para discusión de tesis
      responses:
        "200": {description: Problema, hipótesis, arquitectura, Telecom, IA, seguridad, calidad y mejoras}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/inventory:
    get:
      summary: Inventario AST completo sin truncamiento conversacional
      responses:
        "200": {description: Todos los módulos, funciones, clases, métodos, firmas y rutas}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/layers:
    get:
      summary: Capas de arquitectura y modelo OSI aplicado
      responses:
        "200": {description: Nueve capas de sistema y siete capas OSI con métricas y limitaciones}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/technology:
    get:
      summary: Inventario de Python, JavaScript, CSS, HTML, Java, XML, Gradle y documentación
      responses:
        "200": {description: Archivos, líneas y análisis por tecnología}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/chaquopy:
    get:
      summary: Integración Android-Python, ABI, paquetes, arranque y limitaciones
      responses:
        "200": {description: Perfil Chaquopy extraído de Gradle}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/diagrams:
    get:
      summary: Catálogo real de diagramas PlantUML, SVG y PNG
      responses:
        "200": {description: Diagramas agrupados con fuentes y títulos}
        "403": {description: Requiere rol Desarrollador}

  /api/dev/project/state-of-art:
    get:
      summary: Estado del arte conceptual, brecha y diferenciadores
      responses:
        "200": {description: Comparación técnica y limitación bibliográfica}
        "403": {description: Requiere rol Desarrollador}
