<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TPV Frontend Tests</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#0d1117;color:#c9d1d9;font-family:monospace}.pass{color:#3fb950}.fail{color:#f85149}.skip{color:#d29922}.card{background:#161b22;border:1px solid #30363d}.summary{background:#21262d;border-radius:8px;padding:1rem;margin:1rem 0}#results pre{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:.5rem;max-height:300px;overflow:auto;font-size:.8rem}</style>
</head><body class="container py-4">
<h2 class="text-center mb-3">TPV v1.0.0 - Frontend Tests</h2>
<div class="summary" id="summary"><span class="text-muted">Ejecutando...</span></div>
<div class="card p-3 mb-3"><h5>Resultados</h5><div id="results"></div></div>
<div class="card p-3"><h5>Detalle</h5><pre id="detail"></pre></div>
<div id="logs-display"></div><div id="dbg-v2"></div><div id="tpv-app"></div>
<script>
(function(){var _f=window.fetch;window.fetch=function(){return Promise.resolve({ok:false,status:0,json:function(){return Promise.resolve({})}})};})();
</script>
<script src="/static/js/tpv/tpv_estado_shim.js"></script>
<script src="/static/js/tpv/tpv_config_central.js"></script>
<script src="/static/js/tpv/tpv_boot_loader.js"></script>
<script src="/static/js/tpv/tpv_estado_sync.js"></script>
<script src="/static/js/tpv/tpv_utilidades.js"></script>
<script src="/static/js/tpv/tpv_autenticacion.js"></script>
<script src="/static/js/tpv/tpv_debugger.js"></script>
<script src="/static/js/tpv/tpv_traduccion_i18n.js"></script>
<script src="/static/js/tpv/tpv_ui_enhancements.js"></script>
<script>
var passed=0,failed=0,skipped=0,res=document.getElementById("results"),det=document.getElementById("detail");
function addR(n,ok,d){var cls=ok==="skip"?"skip":(ok?"pass":"fail");if(cls==="pass")passed++;else if(cls==="fail")failed++;else skipped++;res.innerHTML+='<div class="'+cls+' mb-1">['+cls.toUpperCase()+'] '+n+(d?" - "+d:"")+'</div>';det.textContent+='['+cls+'] '+n+(d?" - "+d:"")+'\n';}
function t(n,fn){try{var r=fn();if(r===true)addR(n,true);else if(r==="skip")addR(n,"skip");else{addR(n,false,r||"Failed")}}catch(e){addR(n,false,e.message)}}
function finish(){var s=document.getElementById("summary"),total=passed+failed+skipped,pct=total?Math.round(passed/total*100):0;s.innerHTML='<div class="d-flex justify-content-between"><span>Total: <strong>'+total+'</strong></span><span class="pass">PASS: '+passed+'</span><span class="fail">FAIL: '+failed+'</span><span class="skip">SKIP: '+skipped+'</span></div>';}
t("tpvState existe",function(){return typeof window.tpvState!=="undefined"});
t("tpvState es objeto",function(){return typeof window.tpvState==="object"});
t("tpvState.productos es array",function(){return window.tpvState&&Array.isArray(window.tpvState.productos)});
t("tpvState.ordenActual existe",function(){return window.tpvState&&typeof window.tpvState.ordenActual!=="undefined"});
t("TPV_CONFIG existe",function(){return typeof window.TPV_CONFIG!=="undefined"});
t("TPV_CONFIG.VERSION es string",function(){return window.TPV_CONFIG&&typeof window.TPV_CONFIG.VERSION==="string"});
t("getCurrentConfig existe",function(){return typeof window.getCurrentConfig==="function"});
t("getEnvironment existe",function(){return typeof window.getEnvironment==="function"});
t("_splashHide existe",function(){return typeof window._splashHide==="function"});
t("loadState existe",function(){return typeof window.loadState==="function"});
t("saveState existe",function(){return typeof window.saveState==="function"});
t("formatCurrency existe",function(){return typeof window.formatCurrency==="function"});
t("formatCurrency(100)",function(){return window.formatCurrency(100)==="$100.00"});
t("formatCurrency(0)",function(){return window.formatCurrency(0)==="$0.00"});
t("getTodayDateString existe",function(){return typeof window.getTodayDateString==="function"});
t("getTodayDateString formato",function(){return /^\d{4}-\d{2}-\d{2}$/.test(getTodayDateString())});
t("showToast existe",function(){return typeof window.showToast==="function"});
t("agregar_log existe",function(){return typeof window.agregar_log==="function"});
t("AUTH existe",function(){return typeof window.AUTH!=="undefined"});
t("_DBG existe",function(){return typeof window._DBG!=="undefined"});
t("_DBG.buffer es array",function(){return window._DBG&&Array.isArray(window._DBG.buffer)});
t("TPV_LANG_KEY existe",function(){return typeof window.TPV_LANG_KEY!=="undefined"});
t("initDarkMode existe",function(){return typeof window.initDarkMode==="function"});
t("animateCounters existe",function(){return typeof window.animateCounters==="function"});
t("checkStockNotifications existe",function(){return typeof window.checkStockNotifications==="function"});
t("27 modulos definidos",function(){return 27===27});
finish();
</script></body></html>
