<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:409px;background:#FFFFFF;" width="790px" height="409px" viewBox="0 0 790 409" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta3?><defs/><g><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="368.5313" fill="#DDDDDD" style="stroke:#000000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.9951" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="399.3008" font-family="sans-serif">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="295.8867" font-family="sans-serif">This URL does not look like DEFLATE data.</text><text x="17" y="72.5889" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="367.6641" font-family="sans-serif">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.8857" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="105.1826" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="671.7061" font-family="sans-serif">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.4795" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="560.9365" font-family="sans-serif">http://www.plantuml.com/plantuml/png/eNptksFu00AQhu_7FEO5GVUhqoJQD6...</text><text x="17" y="137.7764" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="14.0547" font-family="sans-serif">to</text><text x="17" y="154.0732" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="581.5742" font-family="sans-serif">http://www.plantuml.com/plantuml/png/~1eNptksFu00AQhu_7FEO5GVUhqoJQD6...</text><text x="17" y="170.3701" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="186.667" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="138.2773" font-family="sans-serif">It will work this way</text><text x="17" y="202.9639" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="428.1484" font-family="sans-serif">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.2607" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="749.376" font-family="sans-serif">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.5576" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="251.8545" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="232.5449" font-family="sans-serif">For the record, here is your data:</text><text x="17" y="268.1514" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="4.4502" font-family="sans-serif"> </text><text x="17" y="284.4482" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="689.2061" font-family="sans-serif">eNptksFu00AQhu_7FEO5GVUhqoJQD6ghoQIJAUraXoDDxJ4mQ9c7ZnecAwiJZ-EVeATehCdhtlbVdYp8</text><text x="17" y="300.7451" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="714.9297" font-family="sans-serif">sf_5vP-_M3OWFKP2rXePdEctwZ43EYO6dMOhw4gtbLC-2UbpQ7MQLxEen8_yUxANXWPv9VyCvkM74-g1</text><text x="17" y="317.042" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="689.9033" font-family="sans-serif">-T0p13j0f2rN3wimJ05ZPUFVLRm3hqAx8MoSNZLy65oS__kdqsp9rD7D8fELmAf75lbgFOabSOARsOtc</text><text x="17" y="333.3389" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="694.4629" font-family="sans-serif">Ia_En0LtmYLSvX77b68mWqgmcx_ery9ggh1PsNfdxMuWgzNrpRH43QHcmS8pYYzivRVioc-blgMnjQf6</text><text x="17" y="349.6357" fill="#000000" font-size="14" lengthAdju