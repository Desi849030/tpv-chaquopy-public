            <div class="tab-pane fade" id="privilegios-tab-pane" role="tabpanel">

                        <span class="badge bg-info" id="priv-badge-rol" style="font-size:0.85em;padding:0.5em 1em">Admin / Dev</span>
                    </div>
                    <p class="text-muted mb-4" style="font-size:0.92em;line-height:1.5">

                        Los cambios toman efecto al iniciar sesión de cada usuario.
                    </p>

                    <!-- ── Selector de Rol (tarjetas táctiles) ── -->
                    <div class="mb-4">
                        <label class="form-label fw-bold mb-3" style="font-size:1.05em"><i class="bi bi-person-badge me-1" translate="no"></i> Seleccionar Rol:</label>

                                <button class="btn w-100 priv-rol-card" onclick="priv_cargarRol('administrador')" id="priv-btn-administrador"
                                        style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:14px;border:2px solid var(--tpv-border);background:var(--tpv-surface);font-weight:600;transition:all 0.2s">
                                    <i class="bi bi-person-gear" style="font-size:1.8em;color:var(--tpv-primary)" translate="no"></i>
                                    <span>Administrador</span>
                                </button>
                            </div>
                            <div class="col-6 col-md-4 col-lg-3">
                                <button class="btn w-100 priv-rol-card" onclick="priv_cargarRol('supervisor')" id="priv-btn-supervisor"
                                        style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:14px;border:2px solid var(--tpv-border);background:var(--tpv-surface);font-weight:600;transition:all 0.2s">
                                    <i class="bi bi-person-check" style="font-size:1.8em;color:var(--tpv-warning)" translate="no"></i>
                                    <span>Supervisor</span>
                                </button>
                            </div>
                            <div class="col-6 col-md-4 col-lg-3">
                                <button class="btn w-100 priv-rol-card" onclick="priv_cargarRol('vendedor')" id="priv-btn-vendedor"
                                        style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:14px;border:2px solid var(--tpv-border);background:var(--tpv-surface);font-weight:600;transition:all 0.2s">
                                    <i class="bi bi-person" style="font-size:1.8em;color:var(--tpv-success)" translate="no"></i>
                                    <span>Vendedor</span>
                                </button>
                            </div>
                            <div class="col-6 col-md-4 col-lg-3">
                                <button class="btn w-100 priv-rol-card" onclick="priv_cargarRol('cajero')" id="priv-btn-cajero"
                                        style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:14px;border:2px solid var(--tpv-border);background:var(--tpv-surface);font-weight:600;transition:all 0.2s">
                                    <i class="bi bi-cash-stack" style="font-size:1.8em;color:#e67e22" translate="no"></i>
                                    <span>Cajero</span>
                                </button>
                            </div>
                            <div class="col-6 col-md-4 col-lg-3">
                                <button class="btn w-100 priv-rol-card" onclick="priv_cargarRol('desarrollador')" id="priv-btn-desarrollador"
                                        style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:14px;border:2px solid var(--tpv-border);background:var(--tpv-surface);font-weight:600;transition:all 0.2s">
                                    <i class="bi bi-code-slash" style="font-size:1.8em;color:#8b5cf6" translate="no"></i>
                                    <span>Desarrollador</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ── Tabla de módulos ── -->
                    <div id="priv-tabla-wrap" style="display:none">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <span class="fw-bold text-uppercase" style="font-size:0.95em" id="priv-rol-activo">—</span>
                            <i class="bi bi-toggle-on text-success" translate="no"></i>
                        </div>
                        <div class="table-responsive" style="border-radius:12px;border:1px solid var(--tpv-border)">
                            <table class="table table-hover align-middle mb-0" style="font-size:0.92em">
                                <thead style="background:var(--tpv-surface-2)">
                                    <tr>
                                        <th style="min-width:160px;padding:12px 16px">Módulo</th>
                                        <th class="d-none d-md-table-cell" style="padding:12px 16px">Descripción</th>
                                        <th class="text-center" style="width:80px;padding:12px 16px">Acceso</th>
                                    </tr>
                                </thead>
                                <tbody id="priv-tabla-body"></tbody>
