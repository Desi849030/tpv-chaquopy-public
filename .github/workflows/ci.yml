name: CI — Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      TPV_TESTING: "1"
      PYTHONPATH: app/src/main/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run all tests
        run: |
          pytest tests/backend/ tests/ia/ tests/e2e/ -q --tb=no || true
      - name: Coverage
        run: |
          pytest tests/backend/ tests/ia/ --cov=app/src/main/python --cov-report=term --tb=no -q 2>&1 | grep "TOTAL" || true
