<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Ultra Smart</title>
    <link rel="stylesheet" href="/static/css/tpv_profesional.css">
    <link rel="stylesheet" href="/static/css/tpv_mobile.css">
    <link rel="stylesheet" href="/static/css/tpv_dark.css">
</head>
<body class="fade-in">
    <!-- SPLASH -->
    <div id="splash-screen">
        <div class="splash-logo">🏪</div>
        <h1 class="splash-title">TPV Ultra Smart</h1>
        <p class="splash-sub">Sistema Punto de Venta Profesional</p>
    </div>

    <!-- LOGIN -->
    <div id="login-screen">
        <div id="user-bar" class="d-none"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🔐</div>
                <h2 class="login-title">Acceso al Sistema</h2>
                <p class="login-sub">Ingresa con tus credenciales</p>
            </div>
            <div id="login-error" style="display:none"><i>⚠️</i><span id="login-error-msg"></span></div>
            <div id="login-hint" style="display:none"></div>
            <div class="login-tabs">
                <button class="login-tab active">Personal</button>
                <button class="login-tab">Cliente</button>
            </div>
            <div class="field">
                <label>Usuario</label>
                <input id="login-username" type="text" placeholder="Usuario">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input id="login-password" type="password" placeholder="Contraseña">
                <button class="pw-toggle" onclick="auth_togglePw(this)">👁️</button>
            </div>
            <button class="btn" id="login-btn" onclick="auth_login()">
                <span id="lbtn-txt">Entrar</span>
                <span id="lbtn-spin" style="display:none">⏳</span>
            </button>
        </div>
    </div>

    <!-- APP -->
    <div id="app-screen" style="display:none">
        <ul id="main-nav-tabs">
            <li id="tienda-tab">Tienda</li>
            <li id="catalog-tab">Catálogo</li>
            <li id="ventas-tab">Ventas</li>
            <li id="inventario-tab">Inventario</li>
            <li id="config-tab">Configuración</li>
        </ul>
        <div id="main-content">
            <div id="user-name"></div>
            <div id="user-role"></div>
            <div id="user-avatar"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/tpv_auth_v2.js"></script>
    <script src="/static/js/tpv_auth_main.js?v=3"></script>
    <script src="/static/js/tpv_login.js?v=2"></script>
</body>
</html>
