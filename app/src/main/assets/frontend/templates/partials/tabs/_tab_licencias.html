            <div class="tab-pane fade" id="licencias-tab-pane" role="tabpanel">
                <div class="glass-card">
                    <h4 class="mb-4"><i class="bi bi-shield-check me-2" translate="no"></i>Gestión de Licencias</h4>

                    <!-- Estado actual -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="bi bi-info-circle me-2 text-primary" translate="no"></i>Estado Actual
                            </h5>
                            <div class="mb-2 d-flex align-items-center gap-3">
                                <span class="text-muted fw-semibold">Estado:</span>
                                <span id="lic-status" class="fw-bold">—</span>
                            </div>

                            <!-- ID Cliente del dispositivo -->
                            <div class="mb-3">
                                <span class="text-muted fw-semibold d-block mb-1">
                                    <i class="bi bi-phone-fill me-1" translate="no"></i>ID de este dispositivo:
                                </span>
                                <div class="input-group input-group-sm">
                                    <input type="text" id="lic-client-id"
                                           class="form-control font-monospace fw-bold"
                                           readonly value="—"
                                           style="font-size:.82rem;background:#f0f9ff;color:#0369a1;border-color:#7dd3fc">
                                    <button class="btn btn-outline-info" title="Copiar ID"
                                            onclick="navigator.clipboard?.writeText(document.getElementById('lic-client-id').value).then(()=>showToast('✅ ID copiado','success'))">
                                        <i class="bi bi-clipboard-fill" translate="no"></i>
                                    </button>
                                </div>
                                <div class="text-muted mt-1" style="font-size:.72rem">
                                    <i class="bi bi-arrow-right-circle me-1" translate="no"></i>
                                    Envía este ID al Desarrollador para que genere tu clave de licencia.
                                </div>
                            </div>

                            <!-- Contador de tiempo restante -->
                            <div id="lic-countdown-container" class="alert alert-info d-none">
                                <i class="bi bi-clock-history me-2" translate="no"></i>Tiempo restante:
                                <strong id="lic-countdown">—</strong>
                            </div>
                            <div id="licencia-info-display"></div>
                        </div>
                    </div>

                    <!-- Activar licencia -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="bi bi-key-fill me-2 text-success" translate="no"></i>Activar Licencia
                            </h5>
                            <div class="row g-3 align-items-end">
                                <div class="col-md-8">
                                    <label for="lic-key-input" class="form-label">Clave de Licencia</label>
                                    <input type="text" id="lic-key-input"
                                           class="form-control font-monospace"
                                           placeholder="Pega aquí la clave que te envió el Desarrollador">
                                </div>
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <button class="btn btn-success" onclick="lic_activateLicense()">
                                            <i class="bi bi-unlock-fill me-2" translate="no"></i>Activar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Desactivar (solo visible cuando licencia activa) -->
                    <div class="card border-danger" id="deactivate-license-section" style="display:none">
                        <div class="card-body">
                            <h5 class="card-title text-danger">
                                <i class="bi bi-shield-x me-2" translate="no"></i>Desactivar Licencia
                            </h5>
                            <p class="text-muted small mb-3">
                                Esto desactivará la licencia y volverá al modo de prueba.
                            </p>
                            <button class="btn btn-outline-danger" onclick="eliminar_licencia()">
                                <i class="bi bi-trash me-2" translate="no"></i>Eliminar Licencia Actual
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pestaña API (Desarrolladores) -->
