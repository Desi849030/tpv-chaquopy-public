<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Ultra Smart v8</title>
    <link rel="stylesheet" href="/static/css/main_theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        #appContent { display: none; }
        .login-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--background); }
        .login-card { width: 100%; max-width: 400px; padding: 30px; text-align: center; }
        #debugConsole { position: fixed; bottom: 0; right: 0; width: 200px; height: 100px; background: rgba(0,0,0,0.7); color: lime; font-size: 10px; overflow: auto; z-index: 10000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="debugConsole">Log: Esperando...</div>

    <div id="loginScreen" class="login-container">
        <div class="card login-card shadow-lg">
            <h2 class="mb-4">🔐 Acceso TPV</h2>
            <div class="mb-3 text-start"><label>Usuario</label><input type="text" id="username" class="form-control" value="desarrollador"></div>
            <div class="mb-4 text-start"><label>Contraseña</label><input type="password" id="password" class="form-control" value="123456"></div>
            <button class="btn btn-primary w-100 btn-modern btn-lg" onclick="App.doLogin()">Entrar</button>
            <div id="loginError" class="text-danger mt-3" style="display:none;">Credenciales incorrectas</div>
        </div>
    </div>

    <div id="appContent">
        <nav class="navbar navbar-dark bg-primary px-3">
            <span class="navbar-brand">🚀 TPV Ultra Smart</span>
            <button class="btn btn-outline-light btn-sm" onclick="App.doLogout()">Cerrar Sesión</button>
        </nav>
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-8 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3>🛒 Ventas</h3>
                        <input type="text" id="searchProduct" class="form-control w-50" placeholder="Buscar...">
                    </div>
                    <div class="product-grid" id="productContainer"></div>
                </div>
                <div class="col-md-4">
                    <div class="cart-panel p-3" style="background: white; border: 1px solid #ddd; height: 80vh; border-radius: 15px;">
                        <h4>📝 Orden</h4><hr>
                        <div id="cartItems" style="height: 60vh; overflow-y: auto;"></div>
                        <div class="border-top pt-3">
                            <div class="d-flex justify-content-between h4"><span>Total:</span><span id="cartTotal">/data/data/com.termux/files/usr/bin/bash.00</span></div>
                            <button class="btn btn-primary w-100 btn-modern btn-lg" onclick="Sales.processSale()">COBRAR</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/modules/auth.js"></script>
    <script src="/static/js/modules/sales.js"></script>
    <script src="/static/js/modules/ui.js"></script>
    <script src="/static/js/modules/inventory.js"></script>
    <script src="/static/js/modules/ai.js"></script>
    <script src="/static/js/tpv_api.js"></script>
    <script>
        const App = {
            log(msg) {
                document.getElementById('debugConsole').innerText = "Log: " + msg;
                console.log(msg);
            },
            async init() {
                this.log("Iniciando App...");
                if (await Auth.check()) { 
                    this.log("Sesión activa");
                    UI.showApp(); 
                } else { 
                    this.log("Sin sesión");
                    UI.showLogin(); 
                }
            },
            async doLogin() {
                this.log("Intentando login...");
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const success = await Auth.login(u, p);
                if (success) {
                    this.log("Login OK!");
                    UI.toggleError(false);
                    UI.showApp();
                } else {
                    this.log("Login Fallido");
                    UI.toggleError(true);
                }
            },
            async doLogout() {
                await Auth.logout();
            }
        };
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
