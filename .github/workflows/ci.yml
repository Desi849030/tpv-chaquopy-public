name: CI Tests and APK

on:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      TPV_TESTING: "1"
      PYTHONPATH: app/src/main/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run all tests
        run: pytest tests/backend/ tests/ia/ tests/e2e/ -q --tb=no || true
      - name: Coverage
        run: pytest tests/backend/ tests/ia/ --cov=app/src/main/python --cov-report=term --tb=no -q 2>&1 | grep "TOTAL" || true

  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: tpv-ultrasmart-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
