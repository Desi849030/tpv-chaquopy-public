<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Smart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #8892b0; margin-top: 5px; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            background: rgba(0,255,136,0.1);
            color: #00ff88;
            border: 1px solid rgba(0,255,136,0.2);
            margin: 5px;
        }
        .badge.offline {
            background: rgba(255,107,107,0.1);
            color: #ff6b6b;
            border-color: rgba(255,107,107,0.2);
        }
        #loginForm {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }
        #loginForm input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1em;
        }
        #loginForm input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        #loginForm button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 10px;
            color: #0a0a1a;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
        }
        #loginForm button:hover { transform: scale(1.02); }
        #loginForm .error { color: #ff6b6b; text-align: center; margin-top: 10px; }
        #chatContainer { display: none; }
        #chatContainer.active { display: block; }
        #messages {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 10px; }
        .msg {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s;
        }
        .msg.user {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            margin-left: auto;
        }
        .msg.assistant {
            background: rgba(255,255,255,0.06);
            margin-right: auto;
        }
        .msg .time {
            font-size: 0.7em;
            opacity: 0.4;
            display: block;
            margin-top: 5px;
        }
        .input-row { display: flex; gap: 10px; }
        .input-row input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1em;
        }
        .input-row input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .input-row button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 10px;
            color: #0a0a1a;
            font-weight: 700;
            cursor: pointer;
        }
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .suggestions button {
            padding: 6px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            color: #8892b0;
            font-size: 0.8em;
            cursor: pointer;
        }
        .suggestions button:hover {
            background: rgba(0,212,255,0.1);
            border-color: #00d4ff;
            color: white;
        }
        .status {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.8em;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 12px;
        }
        .status .online { color: #00ff88; }
        .user-info {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
        }
        .user-info .name { color: #00d4ff; font-weight: 600; }
        .user-info .logout {
            color: #ff6b6b;
            cursor: pointer;
            padding: 4px 12px;
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 8px;
        }
        .user-info .logout:hover { background: rgba(255,107,107,0.1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 TPV Smart</h1>
            <p>Asistente IA Offline v13.0</p>
            <div>
                <span class="badge">🔓 Bypass</span>
                <span class="badge offline">⚡ Offline</span>
            </div>
        </div>

        <div id="loginForm">
            <h3 style="margin-bottom:15px;color:#8892b0;">🔐 Acceso</h3>
            <p style="color:#666;font-size:0.85em;margin-bottom:12px;">Usa cualquier usuario y contraseña</p>
            <input type="text" id="username" placeholder="Usuario" value="admin">
            <input type="password" id="password" placeholder="Contraseña" value="1234">
            <button onclick="login()">🚀 Iniciar</button>
            <div class="error" id="loginError"></div>
        </div>

        <div id="chatContainer">
            <div class="user-info">
                <span class="name" id="userName">👤 Usuario</span>
                <span class="logout" onclick="logout()">🚪 Salir</span>
            </div>
            <div id="messages">
                <div class="msg assistant">
                    👋 ¡Hola! Soy tu asistente. ¿En qué puedo ayudarte?
                    <span class="time">Ahora</span>
                </div>
            </div>
            <div class="input-row">
                <input type="text" id="chatInput" placeholder="Escribe tu pregunta..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()">Enviar</button>
            </div>
            <div class="suggestions">
                <button onclick="suggest('ventas de hoy')">📊 Ventas</button>
                <button onclick="suggest('stock bajo')">📦 Stock</button>
                <button onclick="suggest('cuanto cuesta café')">☕ Precio</button>
                <button onclick="suggest('ayuda')">❓ Ayuda</button>
            </div>
            <div class="status">
                <span>🔗 <span class="online" id="statusIndicator">Conectado</span></span>
                <span id="userRole">Rol: Administrador</span>
            </div>
        </div>
    </div>

    <script>
        let token = null;
        let user = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '';
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                
                if (data.success) {
                    token = data.token;
                    user = data.user;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('chatContainer').classList.add('active');
                    document.getElementById('userName').textContent = `👤 ${user.name || 'Usuario'}`;
                    addMessage('assistant', '✅ ¡Bienvenido! ¿En qué puedo ayudarte?');
                } else {
                    errorEl.textContent = '❌ Error al iniciar';
                }
            } catch(e) {
                errorEl.textContent = '❌ Error de conexión';
            }
        }

        async function send() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            input.value = '';
            input.disabled = true;
            addMessage('user', msg);
            
            try {
                const res = await fetch('/api/agent/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg, mensaje: msg})
                });
                const data = await res.json();
                const reply = data.reply || data.response || data.message || 'No entendí';
                addMessage('assistant', reply);
            } catch(e) {
                addMessage('assistant', '❌ Error al enviar');
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        function suggest(text) {
            document.getElementById('chatInput').value = text;
            send();
        }

        function addMessage(type, text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `${text}<span class="time">${time}</span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function logout() {
            token = null;
            user = null;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('chatContainer').classList.remove('active');
        }

        // Login automático
        setTimeout(login, 500);
    </script>
</body>
</html>
