name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      TPV_TESTING: "1"
      PYTHONPATH: app/src/main/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run critical tests
        run: |
          pytest -q tests/test_security.py tests/test_ventas_atomicas.py tests/test_auth_required.py tests/test_health_headers.py
