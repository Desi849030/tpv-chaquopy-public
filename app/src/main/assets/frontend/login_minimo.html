<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPV Ultra Smart — Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
       color: #e2e8f0; min-height: 100vh; display: flex; align-items: center;
       justify-content: center; padding: 20px; }
.login-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px);
              border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
              padding: 32px; max-width: 380px; width: 100%;
              box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.logo { text-align: center; font-size: 3rem; margin-bottom: 16px; }
.title { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 4px;
         background: linear-gradient(135deg, #60a5fa, #06b6d4);
         -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { text-align: center; font-size: 0.8rem; color: #94a3b8; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
input { width: 100%; padding: 12px 16px; background: #0f141b;
        border: 1px solid #2b3542; border-radius: 10px; color: #fff;
        font-size: 0.95rem; outline: none; }
input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
button { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5, #6366f1);
         color: #fff; border: none; border-radius: 10px; font-size: 1rem;
         font-weight: 600; cursor: pointer; margin-top: 8px;
         box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
button:active { transform: scale(0.98); }
.error { color: #f87171; font-size: 0.8rem; text-align: center; margin-top: 12px; min-height: 1em; }
.hint { text-align: center; font-size: 0.7rem; color: #64748b; margin-top: 16px; }
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">🚀</div>
    <div class="title">TPV Ultra Smart</div>
    <div class="subtitle">Sistema de Punto de Venta v8.14</div>
    <form id="loginForm" onsubmit="return login(event)">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="admin" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password">
        </div>
        <button type="submit">Entrar</button>
        <div class="error" id="error"></div>
    </form>
    <div class="hint">Demo: admin / 123456 · desarrollador / 123456</div>
</div>
<script>
async function login(event) {
    event.preventDefault();
    var u = document.getElementById('username').value;
    var p = document.getElementById('password').value;
    var err = document.getElementById('error');
    err.textContent = '';
    try {
        var r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        var data = await r.json();
        if (r.ok && data.ok) {
            // Login OK → redirigir a la app principal
            window.location.href = '/';
        } else {
            err.textContent = data.error || 'Credenciales incorrectas';
        }
    } catch(e) {
        err.textContent = 'Error de conexión: ' + e.message;
    }
    return false;
}
// Auto-verificar si ya hay sesión activa
fetch('/api/auth/me', {credentials: 'same-origin'})
    .then(r => r.json())
    .then(data => {
        if (data && data.autenticado) {
            // Ya logueado → redirigir
            window.location.href = '/';
        }
    })
    .catch(() => {});
</script>
</body>
</html>
